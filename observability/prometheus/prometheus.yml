global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: mct-api
    metrics_path: /pipeline/metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: mct-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["metrics-exporter:9108"]
