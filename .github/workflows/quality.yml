name: Quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,quality]'
      - name: Static quality gates
        run: |
          ruff check .
          black --check .
          isort --check-only .
          mypy src
      - name: Coverage artifact
        run: |
          coverage run -m pytest
          coverage html
      - uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov

