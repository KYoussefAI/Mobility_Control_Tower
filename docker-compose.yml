name: mobility-control-tower

x-mct-app: &mct-app
  build: .
  image: mobility-control-tower:local
  environment: &mct-env
    MCT_GTFS_SOURCE: "${GTFS_SOURCE:-tisseo}"
    MCT_SERVING_ROOT: /app/data/serving
    MCT_HISTORY_ROOT: /app/data/realtime_history
    MCT_WATERMARK_ROOT: /app/data/watermarks
    MCT_QUALITY_ROOT: /app/data/quality
    MCT_INCIDENT_BACKEND: postgres
    MCT_INCIDENT_DATABASE_URL: "postgresql://${MCT_DB_USER:-mct_app}:${MCT_DB_PASSWORD:-mct_app_demo}@postgres:5432/${MCT_DB_NAME:-mct_app}"
    MCT_STRICT_READINESS: "true"
    MCT_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    MCT_LOG_FORMAT: "${MCT_LOG_FORMAT:-json}"
  volumes:
    - mct-data:/app/data
    - ./config:/app/config:ro

x-airflow-env: &airflow-env
  AIRFLOW_HOME: /app/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER:-mct_airflow}:${AIRFLOW_DB_PASSWORD:-mct_airflow_demo}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}"
  AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_WEBSERVER_SECRET_KEY:-local-demo-secret-key}"
  AIRFLOW_ADMIN_USERNAME: "${AIRFLOW_ADMIN_USERNAME:-admin}"
  AIRFLOW_ADMIN_PASSWORD: "${AIRFLOW_ADMIN_PASSWORD:-admin}"
  AIRFLOW_ADMIN_EMAIL: "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}"
  MCT_GTFS_SOURCE: "${GTFS_SOURCE:-tisseo}"
  MCT_SERVING_ROOT: /app/data/serving
  MCT_HISTORY_ROOT: /app/data/realtime_history
  MCT_WATERMARK_ROOT: /app/data/watermarks
  MCT_QUALITY_ROOT: /app/data/quality
  MCT_INCIDENT_BACKEND: postgres
  MCT_INCIDENT_DATABASE_URL: "postgresql://${MCT_DB_USER:-mct_app}:${MCT_DB_PASSWORD:-mct_app_demo}@postgres:5432/${MCT_DB_NAME:-mct_app}"
  MCT_COLLECTION_INTERVAL_SECONDS: "${MCT_COLLECTION_INTERVAL_SECONDS:-60}"
  MCT_REFRESH_INTERVAL_SECONDS: "${MCT_REFRESH_INTERVAL_SECONDS:-600}"
  MCT_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
  MCT_LOG_FORMAT: "${MCT_LOG_FORMAT:-json}"

services:
  postgres:
    image: postgres:16.4-alpine
    profiles: ["core", "orchestration", "demo"]
    environment:
      POSTGRES_USER: "${AIRFLOW_DB_USER:-mct_airflow}"
      POSTGRES_PASSWORD: "${AIRFLOW_DB_PASSWORD:-mct_airflow_demo}"
      POSTGRES_DB: "${AIRFLOW_DB_NAME:-airflow}"
      MCT_DB_USER: "${MCT_DB_USER:-mct_app}"
      MCT_DB_PASSWORD: "${MCT_DB_PASSWORD:-mct_app_demo}"
      MCT_DB_NAME: "${MCT_DB_NAME:-mct_app}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  incident-migrate:
    <<: *mct-app
    command: ["incident-migrate"]
    profiles: ["core", "orchestration", "observability", "demo"]
    depends_on:
      postgres:
        condition: service_healthy

  demo-bootstrap:
    <<: *mct-app
    command: ["demo-bootstrap"]
    profiles: ["demo"]
    depends_on:
      incident-migrate:
        condition: service_completed_successfully

  airflow-init:
    <<: *mct-app
    command: ["airflow-init"]
    profiles: ["orchestration", "demo"]
    environment:
      <<: *airflow-env
    volumes:
      - mct-data:/app/data
      - airflow-metadata:/app/airflow
      - ./airflow/dags:/app/airflow/dags:ro
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      incident-migrate:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *mct-app
    command: ["airflow-webserver"]
    profiles: ["orchestration", "demo"]
    environment:
      <<: *airflow-env
      MCT_AIRFLOW_PORT: "8080"
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - mct-data:/app/data
      - airflow-metadata:/app/airflow
      - ./airflow/dags:/app/airflow/dags:ro
      - ./config:/app/config:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health | grep -q 'healthy'"]
      interval: 15s
      timeout: 5s
      retries: 20

  airflow-scheduler:
    <<: *mct-app
    command: ["airflow-scheduler"]
    profiles: ["orchestration", "demo"]
    environment:
      <<: *airflow-env
    volumes:
      - mct-data:/app/data
      - airflow-metadata:/app/airflow
      - ./airflow/dags:/app/airflow/dags:ro
      - ./config:/app/config:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 10

  api:
    <<: *mct-app
    command: ["api"]
    profiles: ["core", "demo"]
    environment:
      <<: *mct-env
      MCT_API_PORT: "8000"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      incident-migrate:
        condition: service_completed_successfully
      demo-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 30

  dashboard:
    <<: *mct-app
    command: ["dashboard"]
    profiles: ["core", "demo"]
    environment:
      <<: *mct-env
      MCT_API_URL: "http://api:8000"
      MCT_DASHBOARD_PORT: "8501"
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  metrics-exporter:
    <<: *mct-app
    command: ["metrics-exporter"]
    profiles: ["observability", "demo"]
    environment:
      <<: *mct-env
      MCT_METRICS_PORT: "9108"
    ports:
      - "${MCT_METRICS_PORT:-9108}:9108"
    depends_on:
      incident-migrate:
        condition: service_completed_successfully
      demo-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9108/metrics | grep -q '^mct_serving_artifact_ready'"]
      interval: 10s
      timeout: 5s
      retries: 20

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability", "demo"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_healthy
      metrics-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability", "demo"]
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mct-data:
  airflow-metadata:
  postgres-data:
  prometheus-data:
  grafana-data:
