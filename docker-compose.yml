services:
  api:
    build: .
    command: ["api"]
    environment:
      MCT_HEALTH_PORT: "${API_PORT:-8000}"
      MCT_DUCKDB_PATH: "${DUCKDB_PATH:-/app/data/serving/tisseo/2026-07-17_160355/mobility_control_tower.duckdb}"
      MCT_API_PORT: "${API_PORT:-8000}"
      MCT_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - mct-data:/app/data
      - ./config:/app/config:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  dashboard:
    build: .
    command: ["dashboard"]
    environment:
      MCT_API_URL: "http://api:${API_PORT:-8000}"
      MCT_DASHBOARD_PORT: "${DASHBOARD_PORT:-8501}"
      MCT_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    volumes:
      - mct-data:/app/data
    depends_on:
      - api

  airflow-init:
    build: .
    command: ["airflow-init"]
    environment:
      AIRFLOW_HOME: /app/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////app/airflow/airflow.db
    volumes:
      - airflow-metadata:/app/airflow
      - mct-data:/app/data
      - ./airflow/dags:/app/airflow/dags:ro

  airflow-webserver:
    build: .
    command: ["airflow-webserver"]
    environment:
      AIRFLOW_HOME: /app/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////app/airflow/airflow.db
      MCT_GTFS_SOURCE: "${GTFS_SOURCE:-tisseo}"
      MCT_POLLING_INTERVAL: "${POLLING_INTERVAL:-30}"
      MCT_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - airflow-metadata:/app/airflow
      - mct-data:/app/data
      - ./airflow/dags:/app/airflow/dags:ro
      - ./config:/app/config:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build: .
    command: ["airflow-scheduler"]
    environment:
      AIRFLOW_HOME: /app/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////app/airflow/airflow.db
      MCT_GTFS_SOURCE: "${GTFS_SOURCE:-tisseo}"
      MCT_POLLING_INTERVAL: "${POLLING_INTERVAL:-30}"
      MCT_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - airflow-metadata:/app/airflow
      - mct-data:/app/data
      - ./airflow/dags:/app/airflow/dags:ro
      - ./config:/app/config:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  mct-data:
  airflow-metadata:
